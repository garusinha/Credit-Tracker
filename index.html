<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamirasa Food - Pro Credit Tracker</title>
    <link
      rel="icon"
      type="image/png"
      href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
      .glass-input {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        transition: all 0.2s ease-in-out;
      }
      .glass-input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      }
      .input-label {
        font-size: 0.7rem;
        font-weight: 700;
        color: #64748b;
        text-transform: uppercase;
        margin-bottom: 0.25rem;
      }
      .hidden-section {
        display: none !important;
      }
      .active-tab {
        border-bottom: 4px solid #1d4ed8;
        color: #1d4ed8;
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen text-slate-900">
    <div
      id="login-screen"
      class="fixed inset-0 bg-blue-900 flex items-center justify-center z-50 p-6"
    >
      <div
        class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center"
      >
        <h1 class="text-2xl font-black text-blue-900 uppercase mb-4">
          Gamirasa Food
        </h1>
        <input
          type="password"
          id="pin-input"
          placeholder="Enter PIN to Access"
          class="w-full text-center text-3xl p-4 border-b-4 mb-6 outline-none"
        />
        <button
          onclick="checkPin()"
          class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold"
        >
          SIGN IN
        </button>
      </div>
    </div>

    <div id="main-app" class="hidden-section max-w-4xl mx-auto">
      <div class="flex bg-white shadow-sm sticky top-0 z-30">
        <button
          id="tab-collection-btn"
          onclick="showTab('collection')"
          class="flex-1 py-4 font-bold active-tab text-[10px] uppercase relative"
        >
          Collections
          <span
            id="admin-badge"
            class="hidden absolute top-2 right-4 bg-red-600 text-white text-[8px] px-1.5 py-0.5 rounded-full border-2 border-white"
            >0</span
          >
        </button>
        <button
          id="tab-entry-btn"
          onclick="showTab('entry')"
          class="flex-1 py-4 font-bold text-slate-400 text-[10px] uppercase"
        >
          New Entry
        </button>
        <button
          id="tab-report-btn"
          onclick="showTab('report')"
          class="flex-1 py-4 font-bold text-slate-400 text-[10px] uppercase"
        >
          Due Report
        </button>
      </div>

      <div id="tab-collection" class="p-4 space-y-4">
        <input
          id="shop-search"
          onkeyup="filterShopList()"
          type="text"
          placeholder="🔍 Search shop name..."
          class="w-full p-4 glass-input rounded-2xl outline-none font-bold text-blue-900 shadow-sm"
        />
        <div id="bill-list" class="space-y-3 pb-6"></div>
        <div id="viewer-pending-section" class="hidden-section mt-4 mb-6">
          <h3
            class="font-black text-[10px] uppercase text-orange-500 mb-2 tracking-widest"
          >
            ⏳ Your Pending Approvals
          </h3>
          <div id="viewer-pending-list" class="space-y-2"></div>
        </div>
      </div>

      <div id="tab-entry" class="p-4 hidden-section">
        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
          <h3
            class="font-black text-xs uppercase text-blue-600 mb-6 tracking-widest text-center"
          >
            Add New Bill
          </h3>
          <div class="space-y-4">
            <div>
              <label class="input-label">Shop Name</label>
              <input
                id="shop-name"
                type="text"
                list="shop-suggestions"
                class="w-full p-4 glass-input rounded-2xl outline-none font-bold"
                placeholder="SELECT OR TYPE SHOP"
              />
              <datalist id="shop-suggestions"></datalist>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="input-label">Bill Number</label>
                <input
                  id="bill-no"
                  type="text"
                  placeholder="B001"
                  class="w-full p-4 glass-input rounded-2xl outline-none"
                />
              </div>
              <div>
                <label class="input-label">Amount (Rs.)</label>
                <input
                  id="amount"
                  type="number"
                  placeholder="5000"
                  class="w-full p-4 glass-input rounded-2xl outline-none font-black text-blue-700"
                />
              </div>
            </div>
            <div>
              <label class="input-label">Credit Date</label>
              <input
                id="credit-date"
                type="date"
                class="w-full p-4 glass-input rounded-2xl outline-none font-bold"
              />
            </div>
          </div>
          <button
            onclick="addBill()"
            class="w-full mt-8 bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg"
          >
            SAVE NEW CREDIT
          </button>
        </div>
      </div>

      <div id="tab-report" class="p-4 hidden-section">
        <div class="bg-white p-4 rounded-3xl shadow-sm border mb-4 space-y-3">
          <label class="input-label">Filter Daily Report</label>
          <input
            id="filter-date"
            type="date"
            onchange="updateDueReport()"
            class="w-full p-3 bg-slate-100 rounded-xl font-bold outline-none"
          />
          <div class="flex gap-2">
            <button
              id="filter-credit-btn"
              onclick="toggleReportMode('credit')"
              class="flex-1 py-2 rounded-xl text-[10px] font-black uppercase bg-blue-600 text-white"
            >
              Daily Credits
            </button>
            <button
              id="filter-collection-btn"
              onclick="toggleReportMode('collection')"
              class="flex-1 py-2 rounded-xl text-[10px] font-black uppercase bg-slate-100 text-slate-400"
            >
              Daily Collections
            </button>
          </div>
        </div>

        <button
          onclick="downloadTotalCreditPDF()"
          class="w-full mb-4 bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase flex items-center justify-center gap-2 shadow-xl"
        >
          <span>📥 Download Total Outstanding List</span>
        </button>

        <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
          <div
            class="p-6 flex justify-between items-center bg-slate-50 border-b"
          >
            <h3
              id="report-title"
              class="font-bold text-sm uppercase text-slate-600"
            >
              Daily Report
            </h3>
            <button
              onclick="downloadDailyPDF()"
              class="bg-red-600 text-white px-4 py-2 rounded-lg text-xs font-bold"
            >
              DAILY PDF
            </button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left text-[11px]">
              <thead class="bg-slate-100 text-slate-500 uppercase font-black">
                <tr id="report-headers"></tr>
              </thead>
              <tbody id="summary-table-body" class="divide-y"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div id="admin-approval-section" class="hidden-section p-4">
        <h3
          class="font-black text-xs uppercase text-orange-600 mb-4 tracking-widest"
        >
          ⚠️ Pending Approvals
        </h3>
        <div id="pending-list" class="space-y-2"></div>
      </div>
    </div>

    <div
      id="shop-modal"
      class="fixed inset-0 bg-slate-900/90 hidden-section flex items-center justify-center p-4 z-[60]"
    >
      <div class="bg-white rounded-3xl p-6 w-full max-w-sm relative">
        <button
          onclick="closeShopModal()"
          class="absolute top-4 right-4 text-slate-400"
        >
          ✕
        </button>
        <h2
          id="modal-shop-title"
          class="text-xl font-black text-blue-900 uppercase mb-4"
        ></h2>
        <div
          id="history-list"
          class="space-y-2 mb-4 max-h-48 overflow-y-auto"
        ></div>
        <input
          id="settle-amount"
          type="number"
          placeholder="Enter Cash Collected"
          class="w-full p-4 bg-slate-100 rounded-xl mb-4 font-bold text-center"
        />
        <button
          onclick="confirmSettlement()"
          class="w-full bg-green-600 text-white py-4 rounded-xl font-bold"
        >
          SETTLE & SAVE
        </button>
      </div>
    </div>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        query,
        doc,
        updateDoc,
        deleteDoc, // Added here
        orderBy,
        where,
        serverTimestamp,
        getDoc,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAplDozNJJNuplf5g1P-ZQEhyHK31pXoSo",
        authDomain: "gamirasa-credit-tracking.firebaseapp.com",
        projectId: "gamirasa-credit-tracking",
        storageBucket: "gamirasa-credit-tracking.firebasestorage.app",
        messagingSenderId: "786378167527",
        appId: "1:786378167527:web:03d3f13f5de0d353a7be42",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      let activeBillId = null;
      let allData = [];
      let currentActiveShops = [];
      let reportMode = "credit";

      document.getElementById("credit-date").valueAsDate = new Date();
      document.getElementById("filter-date").valueAsDate = new Date();

      window.checkPin = () => {
        const pin = document.getElementById("pin-input").value;
        const loginScreen = document.getElementById("login-screen");
        const mainApp = document.getElementById("main-app");
        const entryTabBtn = document.getElementById("tab-entry-btn");

        if (pin === "2705") {
          loginScreen.classList.add("hidden-section");
          mainApp.classList.remove("hidden-section");
          loadData();
          loadPendingApprovals(); // Triggers Admin Inbox
        } else if (pin === "1122") {
          loginScreen.classList.add("hidden-section");
          mainApp.classList.remove("hidden-section");
          entryTabBtn.classList.add("hidden-section");
          window.isReadOnly = true;
          loadData();
          loadViewerStatus();
        } else {
          alert("Access Denied");
        }
      };

      window.showTab = (tab) => {
        document
          .getElementById("tab-collection")
          .classList.toggle("hidden-section", tab !== "collection");
        document
          .getElementById("tab-entry")
          .classList.toggle("hidden-section", tab !== "entry");
        document
          .getElementById("tab-report")
          .classList.toggle("hidden-section", tab !== "report");
        document
          .getElementById("tab-collection-btn")
          .classList.toggle("active-tab", tab === "collection");
        document
          .getElementById("tab-entry-btn")
          .classList.toggle("active-tab", tab === "entry");
        document
          .getElementById("tab-report-btn")
          .classList.toggle("active-tab", tab === "report");
      };

      window.addBill = async () => {
        const b = document.getElementById("bill-no").value;
        const s = document
          .getElementById("shop-name")
          .value.trim()
          .toUpperCase();
        const a = parseFloat(document.getElementById("amount").value);
        const d = document.getElementById("credit-date").value;
        if (!b || !s || isNaN(a)) return alert("Fill data");

        await addDoc(collection(db, "bills"), {
          billNo: b,
          shopName: s,
          amount: a,
          balance: a,
          date: d,
          createdAt: serverTimestamp(),
        });

        document.getElementById("bill-no").value = "";
        document.getElementById("amount").value = "";
        alert("Success: Bill Saved!");
        showTab("collection");
      };

      // CONSOLIDATED ADMIN APPROVAL FUNCTION
      async function loadPendingApprovals() {
        if (window.isReadOnly) return;

        const badge = document.getElementById("admin-badge");
        const approvalSection = document.getElementById(
          "admin-approval-section",
        );
        approvalSection.classList.remove("hidden-section");

        onSnapshot(collection(db, "pending_approvals"), (snap) => {
          // 1. Update Badge Count
          const count = snap.size;
          if (count > 0) {
            badge.innerText = count;
            badge.classList.remove("hidden");
          } else {
            badge.classList.add("hidden");
          }

          // 2. Render List for Admin
          let html = "";
          snap.forEach((d) => {
            const data = d.data();
            html += `
        <div class="bg-orange-50 border border-orange-200 p-4 rounded-2xl flex justify-between items-center shadow-sm">
          <div>
            <b class="text-orange-900 block text-sm">${data.shopName}</b>
            <span class="text-[10px] font-bold text-orange-700">Rs. ${data.amount.toLocaleString()}</span>
          </div>
          <div class="flex gap-2">
            <button onclick="rejectPayment('${d.id}')" class="bg-slate-400 text-white px-3 py-2 rounded-xl text-[10px] font-black">REJECT</button>
            <button onclick="approvePayment('${d.id}', '${data.billId}', ${data.amount})" class="bg-green-600 text-white px-3 py-2 rounded-xl text-[10px] font-black">APPROVE</button>
          </div>
        </div>`;
          });
          document.getElementById("pending-list").innerHTML =
            html ||
            '<p class="text-xs text-slate-400">No pending approvals</p>';
        });
      }

      // VIEWER STATUS FUNCTION
      async function loadViewerStatus() {
        const container = document.getElementById("viewer-pending-section");
        const list = document.getElementById("viewer-pending-list");

        if (container) container.classList.remove("hidden-section");

        onSnapshot(collection(db, "pending_approvals"), (snap) => {
          let html = "";
          snap.forEach((d) => {
            const data = d.data();
            html += `
        <div class="bg-white border-l-4 border-orange-400 p-3 rounded-xl shadow-sm flex justify-between items-center">
          <div>
            <b class="text-slate-800 text-xs uppercase">${data.shopName}</b>
            <div class="text-[10px] text-orange-600 font-bold">Rs. ${data.amount.toLocaleString()} (Pending)</div>
          </div>
          <div class="animate-pulse flex space-x-1">
            <div class="h-2 w-2 bg-orange-400 rounded-full"></div>
          </div>
        </div>`;
          });
          if (list)
            list.innerHTML =
              html ||
              '<p class="text-[10px] text-slate-400 italic">No collections currently waiting for approval.</p>';
        });
      }

      window.approvePayment = async (requestId, billId, amount) => {
        const billRef = doc(db, "bills", billId);
        const billSnap = await getDoc(billRef);

        if (billSnap.exists()) {
          await updateDoc(billRef, {
            balance: billSnap.data().balance - amount,
            lastPaymentDate: serverTimestamp(),
          });
          await deleteDoc(doc(db, "pending_approvals", requestId));
          alert("Approved!");
        }
      };

      window.rejectPayment = async (requestId) => {
        if (confirm("Delete this request?")) {
          await deleteDoc(doc(db, "pending_approvals", requestId));
        }
      };

      function loadData() {
        onSnapshot(
          query(collection(db, "bills"), orderBy("createdAt", "desc")),
          (snap) => {
            allData = [];
            const uniqueShops = new Set();
            snap.forEach((d) => {
              const data = d.data();
              allData.push({ id: d.id, ...data });
              uniqueShops.add(data.shopName);
            });

            const suggestions = document.getElementById("shop-suggestions");
            suggestions.innerHTML = "";
            uniqueShops.forEach((s) => {
              const o = document.createElement("option");
              o.value = s;
              suggestions.appendChild(o);
            });

            const grouped = allData.reduce((acc, bill) => {
              if (!acc[bill.shopName])
                acc[bill.shopName] = {
                  name: bill.shopName,
                  total: 0,
                  bills: [],
                };
              acc[bill.shopName].total += bill.balance;
              acc[bill.shopName].bills.push(bill);
              return acc;
            }, {});

            currentActiveShops = Object.values(grouped).filter(
              (s) => s.total > 0,
            );
            filterShopList();
            updateDueReport();
          },
        );
      }

      window.filterShopList = () => {
        const term = document.getElementById("shop-search").value.toUpperCase();
        const filtered = currentActiveShops.filter((s) =>
          s.name.includes(term),
        );
        let html = "";
        filtered.forEach((s) => {
          html += `
        <div onclick="openShopHistory('${s.name}')" class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-600 flex justify-between items-center cursor-pointer">
          <div>
            <b class="text-blue-900 block uppercase">${s.name}</b>
            <span class="text-[10px] text-slate-400 font-bold">${s.bills.filter((b) => b.balance > 0).length} PENDING BILLS</span>
          </div>
          <b class="text-blue-700">Rs. ${s.total.toLocaleString()}</b>
        </div>`;
        });
        document.getElementById("bill-list").innerHTML =
          html ||
          '<p class="text-center text-slate-400 py-10">No active debts found</p>';
      };

      window.toggleReportMode = (m) => {
        reportMode = m;
        document.getElementById("filter-credit-btn").className =
          m === "credit"
            ? "flex-1 py-2 rounded-xl text-[10px] font-black bg-blue-600 text-white"
            : "flex-1 py-2 rounded-xl text-[10px] font-black bg-slate-100 text-slate-400";
        document.getElementById("filter-collection-btn").className =
          m === "collection"
            ? "flex-1 py-2 rounded-xl text-[10px] font-black bg-green-600 text-white"
            : "flex-1 py-2 rounded-xl text-[10px] font-black bg-slate-100 text-slate-400";
        updateDueReport();
      };

      window.updateDueReport = () => {
        const target = document.getElementById("filter-date").value;
        const tbody = document.getElementById("summary-table-body");
        const headers = document.getElementById("report-headers");
        let html = "";
        let total = 0;

        if (reportMode === "credit") {
          headers.innerHTML = `<th class="p-4">Bill</th><th class="p-4">Shop</th><th class="p-4 text-right">Amount</th>`;
          allData
            .filter((b) => b.date === target)
            .forEach((d) => {
              total += d.amount;
              html += `<tr><td class="p-4">${d.billNo}</td><td class="p-4 uppercase">${d.shopName}</td><td class="p-4 text-right">Rs. ${d.amount.toLocaleString()}</td></tr>`;
            });
        } else {
          headers.innerHTML = `<th class="p-4">Shop</th><th class="p-4 text-right">Collected</th>`;
          allData
            .filter(
              (d) =>
                d.lastPaymentDate &&
                d.lastPaymentDate.toDate().toISOString().split("T")[0] ===
                  target,
            )
            .forEach((d) => {
              const amt = d.amount - d.balance;
              total += amt;
              html += `<tr><td class="p-4 uppercase">${d.shopName}</td><td class="p-4 text-right text-green-600">Rs. ${amt.toLocaleString()}</td></tr>`;
            });
        }
        tbody.innerHTML =
          html +
          `<tr class="bg-slate-900 text-white"><td colspan="2" class="p-4 text-right">TOTAL:</td><td class="p-4 text-right font-black">Rs. ${total.toLocaleString()}</td></tr>`;
      };

      window.downloadTotalCreditPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const today = new Date();
        doc.setFontSize(16);
        doc.text("TOTAL OUTSTANDING CREDIT LIST", 15, 15);
        const sortedBills = allData
          .filter((b) => b.balance > 0)
          .sort((a, b) => new Date(a.date) - new Date(b.date));
        const rows = [];
        let grandTotal = 0;
        sortedBills.forEach((b) => {
          const age = Math.floor(
            (today - new Date(b.date)) / (1000 * 60 * 60 * 24),
          );
          grandTotal += b.balance;
          rows.push([
            b.shopName,
            b.billNo,
            b.date,
            age,
            `Rs. ${b.balance.toLocaleString()}`,
          ]);
        });
        doc.autoTable({
          startY: 30,
          head: [["Shop Name", "Bill No", "Date", "Age (Days)", "Balance"]],
          body: rows,
          headStyles: { fillColor: [30, 41, 59] },
          didParseCell: (data) => {
            if (data.column.index === 3 && parseInt(data.cell.raw) >= 14) {
              data.cell.styles.textColor = [200, 0, 0];
              data.cell.styles.fontStyle = "bold";
            }
          },
        });
        doc.text(
          `GRAND TOTAL: Rs. ${grandTotal.toLocaleString()}`,
          15,
          doc.lastAutoTable.finalY + 10,
        );
        doc.save(`Outstanding_${today.toISOString().split("T")[0]}.pdf`);
      };

      window.downloadDailyPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const target = document.getElementById("filter-date").value;
        doc.setFontSize(14);
        doc.text(`DAILY SUMMARY: ${target}`, 15, 15);
        const credits = allData.filter((b) => b.date === target);
        doc.autoTable({
          startY: 25,
          head: [["Bill", "Shop", "Amount"]],
          body: credits.map((d) => [
            d.billNo,
            d.shopName,
            d.amount.toLocaleString(),
          ]),
        });
        const collections = allData.filter(
          (d) =>
            d.lastPaymentDate &&
            d.lastPaymentDate.toDate().toISOString().split("T")[0] === target,
        );
        doc.text("CASH COLLECTIONS", 15, doc.lastAutoTable.finalY + 10);
        doc.autoTable({
          startY: doc.lastAutoTable.finalY + 15,
          head: [["Shop", "Amount"]],
          body: collections.map((d) => [
            d.shopName,
            (d.amount - d.balance).toLocaleString(),
          ]),
        });
        doc.save(`Daily_Report_${target}.pdf`);
      };

      window.openShopHistory = async (name) => {
        const shopsBills = allData.filter(
          (b) => b.shopName === name && b.balance > 0,
        );
        let html = "";
        activeBillId = null;
        shopsBills.forEach((b) => {
          if (!activeBillId) activeBillId = b.id;
          html += `<div class="p-3 bg-slate-50 rounded-xl flex justify-between"><span>Bill ${b.billNo}</span><b>Rs. ${b.balance.toLocaleString()}</b></div>`;
        });
        document.getElementById("modal-shop-title").innerText = name;
        document.getElementById("history-list").innerHTML = html;
        document
          .getElementById("shop-modal")
          .classList.remove("hidden-section");
        const btn = document.querySelector(
          "#shop-modal button[onclick='confirmSettlement()']",
        );
        btn.innerText = window.isReadOnly
          ? "REQUEST APPROVAL"
          : "SETTLE & SAVE";
        btn.className = window.isReadOnly
          ? "w-full bg-orange-500 text-white py-4 rounded-xl font-bold"
          : "w-full bg-green-600 text-white py-4 rounded-xl font-bold";

        document
          .getElementById("shop-modal")
          .classList.remove("hidden-section");
      };

      window.confirmSettlement = async () => {
        const val = parseFloat(document.getElementById("settle-amount").value);
        const shopName = document.getElementById("modal-shop-title").innerText;
        if (!activeBillId || isNaN(val)) return;

        if (window.isReadOnly) {
          await addDoc(collection(db, "pending_approvals"), {
            billId: activeBillId,
            shopName: shopName,
            amount: val,
            status: "pending",
            requestedAt: serverTimestamp(),
            requestedBy: "Viewer",
          });
          alert("Submitted for approval!");
        } else {
          const ref = doc(db, "bills", activeBillId);
          const snap = await getDoc(ref);
          await updateDoc(ref, {
            balance: snap.data().balance - val,
            lastPaymentDate: serverTimestamp(),
          });
          alert("Settled!");
        }
        closeShopModal();
        document.getElementById("settle-amount").value = "";
      };

      window.closeShopModal = () =>
        document.getElementById("shop-modal").classList.add("hidden-section");
    </script>
  </body>
</html>
