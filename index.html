<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamirasa Food - Pro Credit Tracker</title>
    <link
      rel="icon"
      type="image/png"
      href="https://cdn-icons-png.flaticon.com/512/2830/2830305.png"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
      .hidden-section {
        display: none !important;
      }
      .active-tab {
        border-bottom: 4px solid #1d4ed8;
        color: #1d4ed8;
      }
      .overdue-text {
        color: #dc2626;
        font-weight: 900;
      }
      .overdue-bg {
        background-color: #fef2f2 !important;
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen text-slate-900">
    <div
      id="login-screen"
      class="fixed inset-0 bg-blue-900 flex items-center justify-center z-50 p-6 text-center"
    >
      <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
        <div
          class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4"
        >
          <img
            src="https://cdn-icons-png.flaticon.com/512/2830/2830305.png"
            class="w-12 h-12"
            alt="Logo"
          />
        </div>
        <h1
          class="text-2xl font-black text-blue-900 uppercase tracking-tighter"
        >
          Gamirasa Food
        </h1>
        <p
          class="text-[10px] text-slate-400 font-bold mb-6 tracking-widest uppercase"
        >
          Rep Credit System
        </p>
        <input
          type="password"
          id="pin-input"
          placeholder="PIN (2705)"
          class="w-full text-center text-3xl p-4 border-b-4 border-slate-100 outline-none mb-6"
        />
        <button
          onclick="checkPin()"
          class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition"
        >
          SIGN IN
        </button>
      </div>
    </div>

    <div id="main-app" class="hidden-section max-w-4xl mx-auto">
      <div class="flex bg-white shadow-sm sticky top-0 z-30">
        <button
          id="tab-entry-btn"
          onclick="showTab('entry')"
          class="flex-1 py-4 font-bold active-tab text-xs uppercase"
        >
          Collection List
        </button>
        <button
          id="tab-summary-btn"
          onclick="showTab('summary')"
          class="flex-1 py-4 font-bold text-slate-400 text-xs uppercase"
        >
          Due Report
        </button>
      </div>

      <div id="tab-entry" class="p-4 space-y-4">
        <div class="relative">
          <input
            type="text"
            id="search-input"
            onkeyup="filterBills()"
            placeholder="Search Name or Bill No..."
            class="w-full p-4 pl-12 bg-white rounded-2xl border shadow-sm outline-none focus:border-blue-600 transition-all"
          />
          <span class="absolute left-4 top-4 text-slate-400">🔍</span>
        </div>

        <div class="bg-white p-6 rounded-3xl border border-slate-200">
          <h3 class="font-bold mb-4 text-[10px] uppercase text-slate-400">
            Register Credit
          </h3>
          <div class="grid gap-3">
            <div class="grid grid-cols-2 gap-3">
              <input
                id="bill-no"
                type="text"
                placeholder="Bill No"
                class="p-4 bg-slate-50 rounded-xl border outline-none text-sm"
              />
              <input
                id="phone"
                type="tel"
                placeholder="Phone"
                class="p-4 bg-slate-50 rounded-xl border outline-none text-sm"
              />
            </div>
            <input
              id="shop-name"
              type="text"
              placeholder="Shop Name"
              class="p-4 bg-slate-50 rounded-xl border outline-none text-sm"
            />
            <input
              id="amount"
              type="number"
              placeholder="Amount (Rs.)"
              class="p-4 bg-slate-100 rounded-xl font-bold text-blue-700 outline-none border text-lg"
            />
            <input
              id="credit-date"
              type="date"
              class="p-4 bg-blue-50 rounded-xl border border-blue-100 font-bold outline-none text-blue-900"
            />
            <button
              onclick="addBill()"
              class="bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg"
            >
              SAVE RECORD
            </button>
          </div>
        </div>

        <div id="bill-list" class="space-y-3 pb-10"></div>
      </div>

      <div id="tab-summary" class="p-4 hidden-section">
        <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
          <div
            class="p-6 flex justify-between items-center bg-slate-50 border-b"
          >
            <div>
              <h3 class="font-bold text-sm">Outstanding Credits Only</h3>
              <p class="text-[9px] text-slate-400">
                Settled bills are excluded from this report
              </p>
            </div>
            <button
              onclick="downloadPDF()"
              class="bg-red-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md"
            >
              PDF
            </button>
          </div>
          <div class="overflow-x-auto">
            <table id="report-table" class="w-full text-left text-[11px]">
              <thead class="bg-slate-100 text-slate-500 uppercase font-black">
                <tr>
                  <th class="p-4">Bill No</th>
                  <th class="p-4">Shop</th>
                  <th class="p-4">Date</th>
                  <th class="p-4 text-center">Days</th>
                  <th class="p-4 text-right">Balance</th>
                </tr>
              </thead>
              <tbody id="summary-table-body" class="divide-y"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div
      id="shop-modal"
      class="fixed inset-0 bg-slate-900/90 hidden-section flex items-center justify-center p-4 z-[60]"
    >
      <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl relative">
        <button
          onclick="closeShopModal()"
          class="absolute top-4 right-4 text-slate-400 text-2xl"
        >
          ✕
        </button>
        <h2
          id="modal-shop-title"
          class="text-xl font-black text-blue-900 uppercase mb-4 pr-10"
        ></h2>
        <div class="bg-blue-50 p-4 rounded-2xl mb-4 text-xs space-y-1">
          <div class="flex justify-between">
            <span>Credit Age:</span>
            <b id="modal-days-count" class="text-blue-600"></b>
          </div>
          <div
            class="flex justify-between text-blue-800 text-lg font-black border-t pt-2 mt-2"
          >
            <span>Current Balance:</span> <span id="modal-balance"></span>
          </div>
        </div>
        <div class="mb-4">
          <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">
            Payment History
          </p>
          <div
            id="history-list"
            class="space-y-1 text-[10px] max-h-32 overflow-y-auto border-t pt-2"
          ></div>
        </div>
        <div id="settle-controls">
          <input
            id="settle-amount"
            type="number"
            placeholder="Enter Amount"
            class="w-full p-4 bg-slate-100 rounded-xl mb-4 text-center font-bold border outline-none"
          />
          <button
            onclick="confirmSettlement()"
            class="w-full bg-green-600 text-white py-4 rounded-xl font-bold"
          >
            SETTLE NOW
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        query,
        doc,
        updateDoc,
        orderBy,
        where, // Added this
        serverTimestamp,
        getDoc,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAplDozNJJNuplf5g1P-ZQEhyHK31pXoSo",
        authDomain: "gamirasa-credit-tracking.firebaseapp.com",
        projectId: "gamirasa-credit-tracking",
        storageBucket: "gamirasa-credit-tracking.firebasestorage.app",
        messagingSenderId: "786378167527",
        appId: "1:786378167527:web:03d3f13f5de0d353a7be42",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      let activeId = null;
      let allData = [];
      document.getElementById("credit-date").valueAsDate = new Date();

      window.checkPin = () => {
        if (document.getElementById("pin-input").value === "2705") {
          document
            .getElementById("login-screen")
            .classList.add("hidden-section");
          document
            .getElementById("main-app")
            .classList.remove("hidden-section");
          loadData();
        } else alert("Access Denied");
      };

      window.showTab = (tab) => {
        document
          .getElementById("tab-entry")
          .classList.toggle("hidden-section", tab !== "entry");
        document
          .getElementById("tab-summary")
          .classList.toggle("hidden-section", tab !== "summary");
        document
          .getElementById("tab-entry-btn")
          .classList.toggle("active-tab", tab === "entry");
        document
          .getElementById("tab-summary-btn")
          .classList.toggle("active-tab", tab === "summary");
      };

      const calculateDays = (dateStr) => {
        const diff = new Date() - new Date(dateStr);
        return Math.floor(diff / (1000 * 60 * 60 * 24));
      };

      window.filterBills = () => {
        const term = document
          .getElementById("search-input")
          .value.toLowerCase();
        // Search shows BOTH settled and active shops
        renderList(
          allData.filter(
            (b) =>
              b.shopName.toLowerCase().includes(term) ||
              b.billNo.includes(term),
          ),
        );
      };

      window.addBill = async () => {
        const b = document.getElementById("bill-no").value;
        const s = document
          .getElementById("shop-name")
          .value.trim()
          .toUpperCase();
        const p = document.getElementById("phone").value;
        const a = parseFloat(document.getElementById("amount").value);
        const d = document.getElementById("credit-date").value;

        if (!b || !s || isNaN(a))
          return alert("Please fill all required fields");

        // We add the record. The Shop Name acts as the grouping key.
        await addDoc(collection(db, "bills"), {
          billNo: b,
          shopName: s,
          phone: p,
          amount: a,
          balance: a,
          date: d,
          createdAt: serverTimestamp(),
          status: "active", // Ensures data is never removed, only filtered by status
        });

        // Clear inputs
        document.querySelectorAll("input").forEach((i) => (i.value = ""));
        document.getElementById("credit-date").valueAsDate = new Date();
      };

      function loadData() {
        onSnapshot(
          query(collection(db, "bills"), orderBy("createdAt", "desc")),
          (snap) => {
            allData = [];
            snap.forEach((doc) => allData.push({ id: doc.id, ...doc.data() }));

            // Grouping by Shop Name so you see "Shop-wise" entries
            const groupedShops = allData.reduce((acc, bill) => {
              if (!acc[bill.shopName]) {
                acc[bill.shopName] = {
                  name: bill.shopName,
                  totalBalance: 0,
                  bills: [],
                };
              }
              acc[bill.shopName].totalBalance += bill.balance;
              acc[bill.shopName].bills.push(bill);
              return acc;
            }, {});

            renderShopList(Object.values(groupedShops));
          },
        );
      }

      function renderShopList(shops) {
        let html = "";
        shops.forEach((shop) => {
          if (shop.totalBalance > 0) {
            // Only show shops that still owe money
            html += `
        <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-blue-500 mb-3" 
             onclick="openShopHistory('${shop.name}')">
          <div class="flex justify-between items-center">
            <div>
              <b class="text-blue-900 uppercase block">${shop.name}</b>
              <span class="text-[9px] font-bold text-slate-400">${shop.bills.length} ACTIVE BILLS</span>
            </div>
            <b class="text-lg">Rs. ${shop.totalBalance.toLocaleString()}</b>
          </div>
        </div>`;
          }
        });
        document.getElementById("bill-list").innerHTML =
          html || '<p class="text-center">No Credits Found</p>';
      }

      function renderTable(data) {
        let html = "";
        let totalBalance = 0;

        data.forEach((d) => {
          const days = calculateDays(d.date);
          totalBalance += d.balance;
          html += `<tr class="${days >= 14 ? "overdue-bg text-red-700" : ""}">
              <td class="p-4 font-bold">${d.billNo}</td>
              <td class="p-4 uppercase">${d.shopName}</td>
              <td class="p-4">${d.date}</td>
              <td class="p-4 text-center">${days}</td>
              <td class="p-4 text-right font-black">Rs. ${d.balance.toLocaleString()}</td></tr>`;
        });

        // Add the Total Row at the bottom
        if (data.length > 0) {
          html += `
      <tr class="bg-blue-900 text-white">
        <td colspan="4" class="p-4 font-black uppercase text-right">Total Outstanding:</td>
        <td class="p-4 text-right font-black text-lg text-yellow-400">Rs. ${totalBalance.toLocaleString()}</td>
      </tr>`;
        }

        document.getElementById("summary-table-body").innerHTML = html;
      }

      function renderList(data) {
        let html = "";
        data.forEach((d) => {
          const days = calculateDays(d.date);
          const settled = d.balance <= 0;
          html += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 ${settled ? "border-emerald-200 opacity-60" : days >= 14 ? "border-red-600 animate-pulse" : "border-blue-500"}">
                        <div class="flex justify-between items-center" onclick='window.openShopModal("${d.id}")'>
                            <div><b class="text-blue-900 uppercase block">${d.shopName} ${settled ? "(SETTLED)" : ""}</b><span class="text-[9px] font-bold text-slate-400">${days} DAYS</span></div>
                            <b class="text-lg">Rs. ${d.balance.toLocaleString()}</b>
                        </div>
                    </div>`;
        });
        document.getElementById("bill-list").innerHTML =
          html ||
          '<p class="text-center text-slate-400 py-10">All items collected!</p>';
      }

      // Renamed to match the onclick in your renderShopList function
      window.openShopHistory = async (shopName) => {
        const q = query(
          collection(db, "bills"),
          where("shopName", "==", shopName),
          orderBy("date", "asc"),
        );

        const querySnapshot = await getDocs(q);
        let totalShopBalance = 0;
        let historyHtml = "";
        activeId = null; // Reset global activeId

        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const id = docSnap.id;

          // Logic: Identify the oldest bill that still has a balance to settle it first
          if (!activeId && data.balance > 0) {
            activeId = id;
          }

          totalShopBalance += data.balance;

          historyHtml += `
      <div class="p-2 border-b mb-2 ${data.balance <= 0 ? "bg-emerald-50" : "bg-slate-50"} rounded">
        <div class="flex justify-between font-bold">
          <span>Bill: ${data.billNo} ${data.balance <= 0 ? "✅" : ""}</span>
          <span>Rs. ${data.balance.toLocaleString()}</span>
        </div>
        <div class="text-[9px] text-slate-500 uppercase">Date: ${data.date}</div>
      </div>`;
        });

        document.getElementById("modal-shop-title").innerText = shopName;
        document.getElementById("modal-balance").innerText =
          "Rs. " + totalShopBalance.toLocaleString();
        document.getElementById("history-list").innerHTML = historyHtml;

        // Show/Hide input based on if there is debt
        document
          .getElementById("settle-controls")
          .classList.toggle("hidden", totalShopBalance <= 0);
        document
          .getElementById("shop-modal")
          .classList.remove("hidden-section");
      };

      window.confirmSettlement = async () => {
        const amountInput = document.getElementById("settle-amount");
        const pay = parseFloat(amountInput.value);

        if (!activeId) return alert("No pending bills found for this shop.");
        if (!pay || pay <= 0)
          return alert("Please enter a valid payment amount.");

        try {
          const ref = doc(db, "bills", activeId);
          const snap = await getDoc(ref);
          const currentBalance = snap.data().balance;

          if (pay > currentBalance) {
            return alert(
              `Payment exceeds this bill's balance (Max: Rs. ${currentBalance}). Please settle bills one by one.`,
            );
          }

          // Update the bill - Original data is PRESERVED, only balance changes
          await updateDoc(ref, {
            balance: currentBalance - pay,
          });

          amountInput.value = "";
          closeShopModal();
          // Notification for the user
          console.log("Settlement successful for ID:", activeId);
        } catch (error) {
          console.error("Error settling:", error);
          alert("System Error: Could not update balance.");
        }
      };

      window.closeShopModal = () =>
        document.getElementById("shop-modal").classList.add("hidden-section");

      window.confirmSettlement = async () => {
        const payInput = document.getElementById("settle-amount");
        const pay = parseFloat(payInput.value);

        if (!activeId)
          return alert("No active pending bills found for this shop.");
        if (!pay || pay <= 0) return alert("Please enter a valid amount");

        try {
          const ref = doc(db, "bills", activeId);
          const snap = await getDoc(ref);
          const currentBalance = snap.data().balance;

          if (pay > currentBalance) {
            return alert(
              `Amount exceeds bill balance (Max: Rs. ${currentBalance})`,
            );
          }

          // Update the existing bill - NEVER REMOVES DATA
          await updateDoc(ref, {
            balance: currentBalance - pay,
            lastPaymentDate: serverTimestamp(),
          });

          // Optional: Log payment in a sub-collection for history
          await addDoc(collection(db, `bills/${activeId}/payments`), {
            amountPaid: pay,
            date: new Date().toISOString(),
          });

          payInput.value = "";
          closeShopModal();
          alert("Payment Successful!");
        } catch (error) {
          console.error("Settlement Error:", error);
          alert("Error processing payment. Check console.");
        }
      };
      window.downloadPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        const table = document.getElementById("report-table");
        const rows = [];
        const bodyRows = table.querySelectorAll("tbody tr");
        let overdueCount = 0;
        let totalAmount = 0;

        bodyRows.forEach((row) => {
          // 1. Skip the blue total row and any empty rows
          if (
            row.classList.contains("bg-blue-900") ||
            row.innerText.includes("Total Outstanding")
          )
            return;

          const cols = row.querySelectorAll("td");
          if (cols.length >= 5) {
            const billNo = cols[0].innerText.trim();
            const shop = cols[1].innerText.trim();
            const date = cols[2].innerText.trim();
            const days = cols[3].innerText.trim();

            // 2. CLEANING THE AMOUNT (The Critical Fix)
            // This removes everything except numbers. It ignores "Rs", ",", and "."
            const rawText = cols[4].innerText;
            const cleanNumber = rawText.replace(/[^0-9]/g, "");
            const balance = parseInt(cleanNumber) || 0;

            // 3. Add to rows with manual formatting
            rows.push([
              billNo,
              shop,
              date,
              days,
              `Rs ${balance.toLocaleString()}`, // Formats as Rs 1,395
            ]);

            totalAmount += balance;
            if (parseInt(days) >= 14) overdueCount++;
          }
        });

        // 4. PDF Header
        doc.setFillColor(30, 58, 138);
        doc.rect(0, 0, 210, 40, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(20);
        doc.setFont("helvetica", "bold");
        doc.text("GAMIRASA FOOD", 15, 20);
        doc.setFontSize(10);
        doc.text("CREDIT COLLECTION REPORT", 15, 28);

        // 5. Summary Info
        doc.setTextColor(40, 40, 40);
        doc.setFontSize(10);
        doc.text(`Total Records: ${rows.length}`, 15, 50);
        doc.setFont("helvetica", "bold");
        doc.text(`GRAND TOTAL: Rs ${totalAmount.toLocaleString()}`, 130, 50);

        // 6. Generate Table
        doc.autoTable({
          startY: 55,
          head: [["Bill No", "Shop Name", "Date", "Age", "Balance"]],
          body: rows,
          theme: "grid",
          headStyles: { fillColor: [30, 58, 138], textColor: 255 },
          columnStyles: {
            3: { halign: "center" },
            4: { halign: "right", fontStyle: "bold" },
          },
          didParseCell: function (data) {
            if (data.section === "body" && data.column.index === 3) {
              if (parseInt(data.cell.raw) >= 14) {
                data.cell.styles.textColor = [200, 0, 0]; // Red for 14+ days
              }
            }
          },
        });

        doc.save(
          `Gamirasa_Report_${new Date().toISOString().split("T")[0]}.pdf`,
        );
      };
    </script>
  </body>
</html>
